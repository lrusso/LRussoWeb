    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * {
        font-family: Arial;
      }
      body {
        background-color: #000;
        margin: 0;
        padding: 0;
      }
      .media-container {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translateX(-50%) translateY(-50%);
        z-index: -1;
        display: none;
      }
      video {
        width: 100%;
        height: 100%;
      }
      .controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 20px;
        justify-content: center;
        display: none;
        gap: 10px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        color: white;
      }
      #startBtn {
        background-color: #4caf50;
        width: 100px;
      }
      #startBtn.recording {
        background-color: #f44336;
      }
      #qualityBtn {
        background-color: #2196f3;
        width: 100px;
      }
      .loading {
        position: fixed;
        width: 64px;
        height: 64px;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto auto;
        border: 0;
        z-index: 999;
      }
      .lds-spinner {
        color: white;
        display: inline-block;
        position: relative;
        width: 64px;
        height: 64px;
      }
      .lds-spinner div {
        transform-origin: 32px 32px;
        animation: lds-spinner 1.2s linear infinite;
      }
      .lds-spinner div:after {
        content: " ";
        display: block;
        position: absolute;
        top: 3px;
        left: 29px;
        width: 5px;
        height: 14px;
        border-radius: 20%;
        background: white;
      }
      .lds-spinner div:nth-child(1) {
        transform: rotate(0deg);
        animation-delay: -1.1s;
      }
      .lds-spinner div:nth-child(2) {
        transform: rotate(30deg);
        animation-delay: -1s;
      }
      .lds-spinner div:nth-child(3) {
        transform: rotate(60deg);
        animation-delay: -0.9s;
      }
      .lds-spinner div:nth-child(4) {
        transform: rotate(90deg);
        animation-delay: -0.8s;
      }
      .lds-spinner div:nth-child(5) {
        transform: rotate(120deg);
        animation-delay: -0.7s;
      }
      .lds-spinner div:nth-child(6) {
        transform: rotate(150deg);
        animation-delay: -0.6s;
      }
      .lds-spinner div:nth-child(7) {
        transform: rotate(180deg);
        animation-delay: -0.5s;
      }
      .lds-spinner div:nth-child(8) {
        transform: rotate(210deg);
        animation-delay: -0.4s;
      }
      .lds-spinner div:nth-child(9) {
        transform: rotate(240deg);
        animation-delay: -0.3s;
      }
      .lds-spinner div:nth-child(10) {
        transform: rotate(270deg);
        animation-delay: -0.2s;
      }
      .lds-spinner div:nth-child(11) {
        transform: rotate(300deg);
        animation-delay: -0.1s;
      }
      .lds-spinner div:nth-child(12) {
        transform: rotate(330deg);
        animation-delay: 0s;
      }
      @keyframes lds-spinner {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="lds-spinner">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
    <div class="media-container">
      <video id="liveVideo" autoplay muted playsinline></video>
    </div>
    <div class="controls">
      <button id="startBtn"></button>
      <button id="qualityBtn">720p</button>
    </div>

    <script>
      const APP_STRINGS = {
        en: {
          start_recording: "Record",
          stop_recording: "Stop",
        },
        es: {
          start_recording: "Filmar",
          stop_recording: "Detener",
        },
      }

      const USER_LANG = window.navigator.language.substring(0, 2).toLowerCase()
      const GET_APP_STRING = APP_STRINGS[USER_LANG] || APP_STRINGS["en"]
      const t = (stringName) => GET_APP_STRING[stringName] || ""

      let loadingIcon
      let mediaContainer
      let mediaControls

      let startBtn
      let qualityBtn
      let liveVideo
      let videoFormat = "webm"
      let isHighQuality = false
      let isRecording = false

      let mediaStream
      let mediaRecorder
      let recordedChunks = []

      const isUsingiOS = () => {
        return !!(
          window.navigator.userAgent.match(/iPhone/i) ||
          window.navigator.userAgent.match(/iPad/i) ||
          window.navigator.userAgent.match(/iPod/i)
        )
      }

      const openCamera = async () => {
        try {
          if (mediaStream) {
            mediaStream.getTracks().forEach((track) => track.stop())
          }

          mediaStream = null

          let videoConstraints

          if (isHighQuality) {
            if (isUsingiOS()) {
              videoConstraints = { width: 1920, height: 1080 }
            } else {
              videoConstraints = { width: { ideal: 1920 }, height: { ideal: 1080 } }
            }
            document.querySelector(".media-container").style.width = "1920px"
            document.querySelector(".media-container").style.height = "1080px"
            qualityBtn.innerText = "1080p"
          } else {
            if (isUsingiOS()) {
              videoConstraints = { width: 1280, height: 720 }
            } else {
              videoConstraints = { width: { ideal: 1280 }, height: { ideal: 720 } }
            }
            document.querySelector(".media-container").style.width = "1280px"
            document.querySelector(".media-container").style.height = "720px"
            qualityBtn.innerText = "720p"
          }

          mediaStream = await navigator.mediaDevices.getUserMedia({
            video: videoConstraints,
            audio: true,
          })

          liveVideo.srcObject = mediaStream
          liveVideo.play()

          loadingIcon.style.display = "none"
          mediaContainer.style.display = "block"
          mediaControls.style.display = "flex"

          recordedChunks = []

          if (MediaRecorder.isTypeSupported("video/mp4")) {
            videoFormat = "mp4"
          }

          mediaRecorder = new MediaRecorder(mediaStream, {
            mimeType: "video/" + videoFormat,
          })

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              recordedChunks.push(event.data)
            }
          }
          mediaRecorder.onstop = () => {
            downloadVideo()
          }
        } catch (error) {}
      }

      const handleStartButton = () => {
        if (!mediaStream) {
          return
        }

        if (isRecording) {
          startBtn.innerText = t("start_recording")
          startBtn.classList.remove("recording")
          stopRecording()
        } else {
          startBtn.innerText = t("stop_recording")
          startRecording()
          startBtn.classList.add("recording")
        }
        isRecording = !isRecording
      }

      const startRecording = () => {
        if (!mediaStream) {
          return
        }

        mediaRecorder.start()
      }

      const stopRecording = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop()
        }
      }

      const toggleQuality = () => {
        if (!mediaStream || isRecording) {
          return
        }

        loadingIcon.style.display = "block"
        mediaContainer.style.display = "none"
        mediaControls.style.display = "none"

        isHighQuality = !isHighQuality
        openCamera()
      }

      const downloadVideo = () => {
        if (recordedChunks.length > 0) {
          const blob = new Blob(recordedChunks, { type: "video/" + videoFormat })
          const url = URL.createObjectURL(blob)
          const a = document.createElement("a")
          a.style.display = "none"
          a.href = url
          a.download = "video." + videoFormat
          document.body.appendChild(a)
          a.click()
          window.URL.revokeObjectURL(url)
          document.body.removeChild(a)
          recordedChunks = []
        }
      }

      window.addEventListener("load", () => {
        // CHECKING IF THE APP IS LOADED PROPERLY
        let secSameDomain = false
        let secNotIframe = window.top === window.self
        let secLocalFile = window.self.location.protocol === "file:"
        try {
          secSameDomain =
            window.top !== window.self &&
            window.top.location.hostname === window.self.location.hostname
        } catch (err) {
          //
        }
        if (
          secNotIframe || // NOT RUNNING IN AN IFRAME AT ALL
          secSameDomain || // RUNNING IN AN IFRAME IN THE SAME DOMAIN
          secLocalFile // RUNNING IN A LOCAL FILE
        ) {
          loadingIcon = document.querySelector(".loading")
          mediaContainer = document.querySelector(".media-container")
          mediaControls = document.querySelector(".controls")

          startBtn = document.getElementById("startBtn")
          qualityBtn = document.getElementById("qualityBtn")
          liveVideo = document.getElementById("liveVideo")

          startBtn.innerText = t("start_recording")
          startBtn.addEventListener("click", handleStartButton)

          qualityBtn.addEventListener("click", toggleQuality)

          openCamera()
        }
      })
    </script>
  </body>
</html>
