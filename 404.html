<!doctype html>
<html lang="en">
  <head>
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      const redirects = {
        "/intranet": "/Intranet",
        "/spider": "/Spider",
        "/taipei": "/Taipei",
        "/tarot": "/Tarot",
        "/tetris": "/Tetris",
        "/mediaplayer": "/MediaPlayer",
        "/webcamrecorder": "/WebcamRecorder",
      }

      const requestedURL = window.location.href.toLowerCase().trim()
      const currentDomain = window.location.origin.toLowerCase()
      let mustRedirectToHome = true

      for (const path in redirects) {
        if (
          requestedURL.endsWith(currentDomain + path) ||
          requestedURL.endsWith(currentDomain + path + "/")
        ) {
          mustRedirectToHome = false
          if (redirects[path].startsWith("/")) {
            window.location.href = currentDomain + redirects[path] + "/"
          } else {
            window.location.href = redirects[path]
          }
        }
      }

      if (mustRedirectToHome) {
        window.location.href = currentDomain
      }
    </script>
  </body>
</html>
