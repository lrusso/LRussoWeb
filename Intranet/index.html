      iframe {
        display: block;
        margin: 0;
        border: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
      }
      #desktop {
        display: none;
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #desktop-files {
        position: relative;
        width: 100vw;
        height: calc(100vh - (50px));
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        box-sizing: border-box;
        flex-direction: column;
      }
      .desktop-icon {
        flex-direction: column;
        align-items: center;
        display: inline-block;
        overflow: hidden;
        margin-left: 15px;
        margin-top: 15px;
        width: 80px;
        cursor: pointer;
        text-align: center;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
      }
      .desktop-icon img {
        width: 48px;
        height: 48px;
        margin-bottom: 5px;
        color: #fff;
      }
      .desktop-icon span {
        display: block;
        overflow: hidden;
        height: 38px;
        text-overflow: clip;
        color: #fff;
      }
      #taskbar {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: #c0c0c0;
        border-top: 1px solid #fff;
        display: flex;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
      }
      #startButton {
        padding: 5px 16px;
        font-weight: bold;
        margin-left: 5px;
        margin-right: 5px;
        cursor: pointer;
      }
      #startButton svg {
        display: block;
      }
      #taskbarWindows {
        display: flex;
        flex-grow: 1;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        align-items: center;
      }
      .taskbar-window-button {
        border: 1px solid #8c8c8c;
        border-radius: 8px;
        padding: 6px 100px 6px 8px;
        margin-right: 5px;
        height: 22px;
        line-height: 22px;
        display: flex;
        align-items: center;
        max-width: 150px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }
      .taskbar-window-button.active {
        background-color: #999999;
        border: 1px solid #999999;
      }
      #clock {
        height: 22px;
        line-height: 22px;
        padding-left: 15px;
        padding-right: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        cursor: pointer;
      }
      #calendar {
        position: absolute;
        bottom: 50px;
        right: 0;
        z-index: 1001;
      }
      .window {
        position: absolute;
        left: 0 !important;
        top: 0 !important;
        background-color: #c0c0c0;
        box-shadow: 1px 1px 0px 0px #000;
        width: 100%;
        height: calc(100% - (50px));
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      .window-title-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 5px;
        height: 40px;
        padding-right: 5px;
        font-size: 13px;
        font-weight: bold;
        background-color: #3a76b1;
      }
      .window-title-bar.inactive {
        background-color: gray;
      }
      .window-title-text {
        flex-grow: 1;
        margin-left: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #fff;
      }
      .window-controls {
        display: flex;
        justify-content: center;
        align-content: center;
        vertical-align: center;
      }
      .window-control-button {
        cursor: pointer;
      }
      .window-control-button svg {
        display: block;
      }
      .window-content {
        flex-grow: 1;
        background-color: #c0c0c0;
        padding: 0;
        margin: 0;
        overflow: auto;
        color: #000;
        font-size: 14px;
        box-sizing: border-box;
      }
      .window-background {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }
      .booting {
        position: fixed;
        width: 64px;
        height: 64px;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto auto;
        border: 0;
        z-index: 999;
      }
      .lds-spinner {
        color: white;
        display: inline-block;
        position: relative;
        width: 64px;
        height: 64px;
      }
      .lds-spinner div {
        transform-origin: 32px 32px;
        animation: lds-spinner 1.2s linear infinite;
      }
      .lds-spinner div:after {
        content: " ";
        display: block;
        position: absolute;
        top: 3px;
        left: 29px;
        width: 5px;
        height: 14px;
        border-radius: 20%;
        background: white;
      }
      .lds-spinner div:nth-child(1) {
        transform: rotate(0deg);
        animation-delay: -1.1s;
      }

      class Screensaver {
        constructor({ secondsInactive, speed, logo, disabledWhenUsingIframes }) {
          this.secondsInactive = secondsInactive
          this.speed = speed
          this.logo = logo
          this.disabledWhenUsingIframes = disabledWhenUsingIframes
          this.container = null
          this.imgX = 0
          this.imgY = 0
          this.imgWidth = 0
          this.imgHeight = 0
          this.idleCounter = 0
          this.movingDown = true
          this.enabled = false

          const _this = this
          const tmpImg = document.createElement("img")
          tmpImg.src = logo
          tmpImg.onload = function () {
            _this.imgWidth = tmpImg.width
            _this.imgHeight = tmpImg.height
            _this.init()
          }
        }

        init() {
          this.container = document.createElement("div")
          this.container.style.position = "fixed"
          this.container.style.left = 0
          this.container.style.right = 0
          this.container.style.top = 0
          this.container.style.bottom = 0
          this.container.style.zIndex = 9999
          this.container.style.cursor = "none"
          this.container.style.display = "none"
          this.container.style.outline = "none"
          this.container.style.backgroundColor = "black"
          this.container.style.userSelect = "none"
          this.container.style.backgroundImage = "url(" + this.logo + ")"
          this.container.style.backgroundRepeat = "no-repeat"
          document.getElementsByTagName("BODY")[0].appendChild(this.container)

          const _this = this
          setInterval(_this.updateCounter.bind(_this), 1000)

          window.addEventListener("click", function () {
            _this.stop()
          })
          window.addEventListener("dblclick", function () {
            _this.stop()
          })
          window.addEventListener("mouseup", function () {
            _this.stop()
          })
          window.addEventListener("mousemove", function () {
            _this.stop()
          })
          window.addEventListener("wheel", function () {
            _this.stop()
          })
          window.addEventListener("keypress", function () {
            _this.stop()
          })
          window.addEventListener("keydown", function () {
            _this.stop()
          })
          window.addEventListener("keyup", function () {
            _this.stop()
          })
          window.addEventListener("touchstart", function () {
            _this.stop()
          })
        }

        updateCounter() {
          const hasIframe = document.getElementsByTagName("iframe")[0] ? true : false

          if (this.disabledWhenUsingIframes && hasIframe) {
            return
          }

          this.idleCounter = this.idleCounter + 1

          if (this.idleCounter >= this.secondsInactive) {
            if (!this.enabled) {
              this.startScreensaver()
            }
          }
        }

        startScreensaver() {
          this.enabled = true

          this.imgX = 0
          this.imgY = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "hidden"

          this.container.style.display = "block"

          window.scrollTo(0, 0)

          this.animate()
        }

        stop() {
          if (!document.hasFocus()) {
            return
          }

          this.enabled = false

          this.idleCounter = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "initial"

          this.container.style.display = "none"
        }

        animate() {
          const _this = this

          function loop() {
            if (_this.enabled) {
              _this.imgX = _this.imgX + _this.speed
              _this.imgY = _this.movingDown
                ? _this.imgY + _this.speed
                : _this.imgY - _this.speed

              _this.container.style.backgroundPositionX =
                _this.imgX.toFixed(0) + "px"
              _this.container.style.backgroundPositionY =
                _this.imgY.toFixed(0) + "px"

              if (_this.imgY > _this.container.offsetHeight - _this.imgHeight) {
                _this.movingDown = false
              }

              if (_this.imgY < 0) {
                _this.movingDown = true
              }

              if (_this.imgX > _this.container.offsetWidth) {
                _this.imgX = -_this.imgWidth
                _this.imgY = parseInt(
                  Math.random() * _this.container.offsetHeight - _this.imgHeight
                )
                _this.movingDown = true
              }

              setTimeout(loop, 20)
            }
          }

          loop()
        }
      }

      class Calendar {
        constructor(params) {
          this.warpper = null
          this.monthData = null
          this.params = params
          this.dayWords = params.days
          this.monthsWords = params.months
          this.init(this.params)
        }

        init(params) {
          this.warpper = params.dom
          this.render("", params)

          let thisCalendar = this

          this.warpper.addEventListener(
            "click",
            function (e) {
              try {
                let $target = e.target
                if (
                  $target.id === "calendar_prev_date_btn" ||
                  $target.id === "calendar_prev_date_btn_2" ||
                  $target.id === "calendar_prev_date_btn_3"
                ) {
                  thisCalendar.render("prev")
                } else if (
                  $target.id === "calendar_next_date_btn" ||
                  $target.id === "calendar_next_date_btn_2" ||
                  $target.id === "calendar_next_date_btn_3"
                ) {
                  thisCalendar.render("next")
                }
              } catch (err) {}
            },
            false
          )
        }

        getMonthData(year, month, day) {
          let calendar_gray =
            "width:70px;height:70px;color:black;line-height:40px;font-size:14px;text-align:center;color:#f9f9fb;background-color:#f9f9fb"
          let calendar_normal =
            "width:70px;height:70px;color:black;line-height:40px;font-size:14px;text-align:center;color:black;background-color:white"
          let calendar_current =
            "width:70px;height:70px;color:black;line-height:40px;font-size:14px;text-align:center;background:#3a76b1;color:white"

          let ret = []

          if (!year || !month) {
            let today = new Date()
            year = today.getFullYear()
            month = today.getMonth() + 1
            day = today.getDay()
          }

          let firstDay = new Date(year, month - 1, 1)
          let firstDayWeekDay = firstDay.getDay()
          if (firstDayWeekDay === 0) {
            firstDayWeekDay = 7
          }

          year = firstDay.getFullYear()
          month = firstDay.getMonth() + 1

          let preMonthDayCount = firstDayWeekDay - 1
          let lastDay = new Date(year, month, 0)
          let lastDate = lastDay.getDate()
          let styleCls = ""

          for (var i = 0; i < 7 * 6; i++) {
            let date = i + 1 - preMonthDayCount
            let showDate = date
            let thisMonth = month

            if (date <= 0) {
              thisMonth = month - 1
              showDate = ""
              styleCls = calendar_gray
            } else if (date > lastDate) {
              thisMonth = month + 1
              showDate = showDate - lastDate
              styleCls = "nothing"
            } else {
              let today = new Date()
              if (
                showDate === day &&
                thisMonth === today.getMonth() + 1 &&
                year === today.getFullYear()
              ) {
                styleCls = calendar_current
              } else {
                styleCls = calendar_normal
              }
            }

            if (thisMonth === 13) {
              thisMonth = 1
            } else if (thisMonth === 0) {
              thisMonth = 12
            }

            ret.push({
              month: thisMonth,
              date: date,
              showDate: showDate,
              styleCls: styleCls,
            })
          }

          return { year: year, month: month, date: ret, day: day }
        }

        render(direction, params) {
          let year, month, day
          if (this.monthData) {
            year = this.monthData.year
            month = this.monthData.month
            day = this.monthData.day
          } else {
            year = params.year
            month = params.month
            day = params.day
          }

          if (direction === "prev") {
            month--
            if (month === 0) {
              month = 12
              year--
            }
          } else if (direction === "next") {
            month++
          }

          this.warpper.innerHTML = this.buildUI(year, month, day)
        }

        buildUI(year, month, day) {
          this.monthData = this.getMonthData(year, month, day)

          let calendar_date_picker_warpper =
            "width:499px;background-color:white;font-family:Arial;border-top-left-radius:10px;border:thin solid silver;-webkit-user-select:none;-moz-user-select:none;user-select:none"
          let calendar_date_picker_header =
            "display:inline-block;width:499px;height:64px;font-size:0;position:relative"
          let calendar_prev_date_btn =
            "font-size:30px;width:40px;text-align:center;color:#3a76b1;padding-left:10px;padding-right:10px;text-decoration: none;cursor:pointer;display:inline-block;height:64px;line-height:64px;position:absolute;left:0px;top:0px"
          let calendar_prev_date_btn_2 = "fill:#3a76b1;cursor:pointer"
          let calendar_next_date_btn =
            "font-size:30px;width:40px;text-align:center;color:#3a76b1;padding-left:10px;padding-right:10px;text-decoration: none;cursor:pointer;display:inline-block;height:64px;line-height:64px;position:absolute;right:0px;top:0px"
          let calendar_next_date_btn_2 = "fill:#3a76b1;cursor:pointer"
          let calendar_date_title =
            "width:499px;font-size:20px;font-weight:bold;color:black;text-align:center;display:inline-block;height:64px;line-height:64px"
          let calendar_date_picker_body = "width:499px"

          let calendar_date_picker_table =
            "border-spacing:0;border-collapse:collapse;background-color:#f9f9fb"
          let calendar_date_picker_table_th =
            "height:70px;color:black;line-height:40px;text-align:center;font-size:14px;background-color:#E7E9ED;text-transform:uppercase"
          let calendar_date_picker_table_td =
            "width:70px;height:70px;color:black;line-height:40px;font-size:14px;text-align:center;color:#f9f9fb;background-color:#f9f9fb"

          let html = ""
          html += "<div style='" + calendar_date_picker_warpper + "'>"

          html += "<div style='" + calendar_date_picker_header + "'>"

          html +=
            "<a style='" + calendar_prev_date_btn + "' id='calendar_prev_date_btn'>"
          html +=
            "<svg height='24' width='24' version='1.1' style='" +
            calendar_prev_date_btn_2 +
            "' id='calendar_prev_date_btn_2' viewbox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path style='" +
            calendar_prev_date_btn_2 +
            "' id='calendar_prev_date_btn_3' d='M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z'></path></svg>"
          html += "</a>"

          html +=
            "<span style='" +
            calendar_date_title +
            "'>" +
            this.monthsWords[this.monthData.month - 1] +
            " " +
            this.monthData.year +
            "</span>"

          html +=
            "<a style='" + calendar_next_date_btn + "' id='calendar_next_date_btn'>"
          html +=
            "<svg height='24' width='24' version='1.1' style='" +
            calendar_next_date_btn_2 +
            "' id='calendar_next_date_btn_2' viewbox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path style='" +
            calendar_next_date_btn_2 +
            "' id='calendar_next_date_btn_3' d='M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z'></path></svg>"
          html += "</a>"

          html += "</div>"

          html += "<div style='" + calendar_date_picker_body + "'>"
          html += "<table style='" + calendar_date_picker_table + "'><thead><tr>"

          for (var i = 0; i < this.dayWords.length; i++) {
            html +=
              "<th style='" +
              calendar_date_picker_table_th +
              "'>" +
              this.dayWords[i] +
              "</th>"
          }

          html += "</tr></thead><tbody>"

          let started = false

          for (var i = 0; i < this.monthData.date.length; i++) {
            if (i % 7 === 0) {
              if (this.monthData.date[i].styleCls !== "nothing") {
                html += "<tr>"
                started = true
              } else {
                started = false
              }
            }

            if (this.monthData.date[i].styleCls === "nothing") {
              if (started) {
                html += "<td style='" + calendar_date_picker_table_td + "'></td>"
              }
            } else {
              if (started) {
                html +=
                  "<td style='" +
                  this.monthData.date[i].styleCls +
                  "'>" +
                  this.monthData.date[i].showDate +
                  "</td>"
              }
            }

            if (i % 7 === 6) {
              if (started) {
                html += "</tr>"
              }
            }
          }

          html += "</tbody></table></div></div>"

          return html
        }
      }

      // -----------------------------------------------------
      // ENDS CALENDAR.JS
      // -----------------------------------------------------

      let desktop = null
      let taskbarWindows = null

      let activeWindow = null
      let windowIdCounter = 0
      let highestZIndex = 50

      const createNewWindow = (title, content) => {
        const currentSelection = window.getSelection()
        currentSelection.removeAllRanges()

        let windowSentToFront = false

        // CHECKING IF THE WINDOW WAS ALREADY CREATED, IF SO, IT WILL BRING IT BACK TO THE FRONT
        const allWindowsTitles = document.querySelectorAll(".window-title-text")
        allWindowsTitles.forEach((windowTitle) => {
          if (windowTitle.textContent === title) {
            windowTitle.click()
            windowSentToFront = true
          }
        })

        if (windowSentToFront) {
          return
        }

        windowIdCounter = windowIdCounter + 1
        const windowId = "window-" + windowIdCounter

        const windowElement = document.createElement("div")
        windowElement.classList.add("window")
        windowElement.id = windowId

        const titleBar = document.createElement("div")
        titleBar.classList.add("window-title-bar")

        const titleText = document.createElement("span")
        titleText.classList.add("window-title-text")
        titleText.textContent = title

        const controls = document.createElement("div")
        controls.classList.add("window-controls")

        const closeButton = document.createElement("div")
        closeButton.classList.add("window-control-button")
        closeButton.innerHTML =
          '<svg width="24px" height="24px" viewBox="0 0 512 512" fill="#FFF"><path d="M443.6,387.1L312.4,255.4l131.5-130c5.4-5.4,5.4-14.2,0-19.6l-37.4-37.6c-2.6-2.6-6.1-4-9.8-4c-3.7,0-7.2,1.5-9.8,4  L256,197.8L124.9,68.3c-2.6-2.6-6.1-4-9.8-4c-3.7,0-7.2,1.5-9.8,4L68,105.9c-5.4,5.4-5.4,14.2,0,19.6l131.5,130L68.4,387.1  c-2.6,2.6-4.1,6.1-4.1,9.8c0,3.7,1.4,7.2,4.1,9.8l37.4,37.6c2.7,2.7,6.2,4.1,9.8,4.1c3.5,0,7.1-1.3,9.8-4.1L256,313.1l130.7,131.1  c2.7,2.7,6.2,4.1,9.8,4.1c3.5,0,7.1-1.3,9.8-4.1l37.4-37.6c2.6-2.6,4.1-6.1,4.1-9.8C447.7,393.2,446.2,389.7,443.6,387.1z"/></svg>'
        closeButton.addEventListener("click", (e) => {
          windowElement.remove()
          const taskbarButton = document.querySelector(
            ".taskbar-window-button[data-window-id=" + windowId + "]"
          )
          if (taskbarButton) {
            taskbarButton.remove()
          }

          if (activeWindow === windowElement) {
            activeWindow = null
          }

          // GETTING ALL THE WINDOWS
          const allWindows = document.querySelectorAll(".window")

          // AFTER CLOSING A WINDOW, ACTIVATING THE LAST WINDOW (IF ANY)
          if (allWindows.length > 0) {
            let highestZIndex = -1
            let windowToActivate = null

            // FIND THE WINDOW WITH THE HIGHEST Z-INDEX AMONG THE REMAINING WINDOWS
            allWindows.forEach((window) => {
              const currentZIndex = parseInt(window.style.zIndex || 0)
              // ENSURE WE DON'T TRY TO ACTIVATE THE WINDOW THAT WAS JUST CLOSED
              if (window !== windowElement && currentZIndex > highestZIndex) {
                highestZIndex = currentZIndex
                windowToActivate = window
              }
            })

            // IF A WINDOW TO ACTIVATE IS FOUND, CLICK IT TO BRING IT TO THE FRONT
            if (windowToActivate) {
              setTimeout(() => {
                windowToActivate.click()
              }, 25)
            }
          }

        titleBar.appendChild(titleText)
        titleBar.appendChild(controls)

        contentArea.classList.add("window-content")

        windowElement.appendChild(contentArea)

        windowElement.addEventListener("click", () => {
          activateWindow(windowElement)
        })

        desktop.appendChild(windowElement)

        createTaskbarButton(windowId, title)
        activateWindow(windowElement)

        // IF THE WINDOW CONTENT DOESN'T CONTAIN A IFRAME,
        // IT MEANS THAT THE WINDOW MUST NOT BE MAXIMIZED
        if (content.indexOf("iframe") === -1) {

        button.classList.add("taskbar-window-button")
        button.setAttribute("data-window-id", windowId)

        taskbarWindows.appendChild(button)

          if (windowEl) {

      const activateWindow = (windowEl) => {
        if (activeWindow) {
          const prevTaskbarBtn = document.querySelector(
            ".taskbar-window-button[data-window-id=" + activeWindow.id + "]"
          )
          if (prevTaskbarBtn) {
            prevTaskbarBtn.classList.remove("active")
          }

        const allWindows = document.querySelectorAll(".window")

        // DEACTIVATING ALL THE WINDOW TITLES
        allWindows.forEach((windowElement) => {
          windowElement.children[0].classList.add("inactive")
        })

        // ACTIVATING THE WINDOW TITLE
        windowEl.children[0].classList.remove("inactive")

        activeWindow = windowEl
        highestZIndex = highestZIndex + 1
        activeWindow.style.zIndex = highestZIndex

        // FORCING FOCUS ON THE IFRAME (IF EXISTS) AFTER HIDING THE CALENDAR
        if (windowEl.childNodes[1].childNodes.length) {
          if (windowEl.childNodes[1].childNodes[0].nodeName === "IFRAME") {
            windowEl.childNodes[1].childNodes[0].focus()
            windowEl.childNodes[1].childNodes[0].click()
          }
        }

        const currentTaskbarBtn = document.querySelector(
          ".taskbar-window-button[data-window-id=" + windowEl.id + "]"
        )
        if (currentTaskbarBtn) {
          currentTaskbarBtn.classList.add("active")
        }

            if (activeWindow) {
              const currentWindow = document.querySelector(
                ".window[id=" + activeWindow.id + "]"
              )
              if (currentWindow) {

                if (currentWindow.childNodes[1].childNodes.length) {

                  }
                }

            event.target.id !== "calendar_prev_date_btn_3" &&
            event.target.id !== "calendar_next_date_btn" &&
