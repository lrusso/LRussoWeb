      class Screensaver {
        constructor({ secondsInactive, speed, logo, disabledWhenUsingIframes }) {

          this.logo = logo
          this.disabledWhenUsingIframes = disabledWhenUsingIframes
          this.container = null
          this.imgX = 0
          this.imgY = 0
          this.imgWidth = 0
          this.imgHeight = 0
          this.idleCounter = 0
          this.movingDown = true
          this.enabled = false

          var tmpImg = document.createElement("img")
          tmpImg.src = logo
          tmpImg.onload = function () {
            _this.imgWidth = tmpImg.width
            _this.imgHeight = tmpImg.height

          this.container.style.backgroundColor = "#000"
          this.container.style.userSelect = "none"
          this.container.style.backgroundImage = "url(" + this.logo + ")"
          this.container.style.backgroundRepeat = "no-repeat"
          document.getElementsByTagName("BODY")[0].appendChild(this.container)

          var _this = this
          setInterval(_this.updateCounter.bind(_this), 1000)

          window.addEventListener("click", function () {
            _this.stop()
          })
          window.addEventListener("dblclick", function () {
            _this.stop()
          })
          window.addEventListener("mouseup", function () {
            _this.stop()
          })
          window.addEventListener("mousemove", function () {
            _this.stop()
          })
          window.addEventListener("wheel", function () {
            _this.stop()
          })
          window.addEventListener("keypress", function () {
            _this.stop()
          })
          window.addEventListener("keydown", function () {
            _this.stop()
          })
          window.addEventListener("keyup", function () {
            _this.stop()
          })
          window.addEventListener("touchstart", function () {
            _this.stop()
          })
        }

        updateCounter() {
          var hasIframe = document.getElementsByTagName("iframe")[0] ? true : false

          if (this.disabledWhenUsingIframes && hasIframe) {
            return
          }

          this.idleCounter = this.idleCounter + 1

          if (this.idleCounter >= this.secondsInactive) {
            if (!this.enabled) {
              this.startScreensaver()
            }
          }
        }

        startScreensaver() {
          this.enabled = true

          this.imgX = 0
          this.imgY = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "hidden"

          this.container.style.display = "block"

          window.scrollTo(0, 0)

          this.animate()
        }

        stop() {
          if (!document.hasFocus()) {
            return
          }

          this.enabled = false

          this.idleCounter = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "initial"

          this.container.style.display = "none"
        }

        animate() {
          var _this = this

          function loop() {
            if (_this.enabled) {
              _this.imgX = _this.imgX + _this.speed
              _this.imgY = _this.movingDown
                ? _this.imgY + _this.speed
                : _this.imgY - _this.speed

              _this.container.style.backgroundPositionX =
                _this.imgX.toFixed(0) + "px"
              _this.container.style.backgroundPositionY =
                _this.imgY.toFixed(0) + "px"

              if (_this.imgY > _this.container.offsetHeight - _this.imgHeight) {
                _this.movingDown = false
              }

              if (_this.imgY < 0) {
                _this.movingDown = true
              }

              if (_this.imgX > _this.container.offsetWidth) {
                _this.imgX = -_this.imgWidth
                _this.imgY = parseInt(
                  Math.random() * _this.container.offsetHeight - _this.imgHeight
                )
                _this.movingDown = true
              }

              setTimeout(loop, 20)
            }
          }

          loop()
        }
      }

        }

        init(params) {
          this.warpper = params.dom
          this.render("", params)

          var thisCalendar = this

          this.warpper.addEventListener(
            "click",
            function (e) {
              try {
                var $target = e.target
                if (
                  $target.id === "calendar_prev_date_btn" ||
                  $target.id === "calendar_prev_date_btn_2" ||
                  $target.id === "calendar_prev_date_btn_3"
                ) {
                  thisCalendar.render("prev")
                } else if (
                  $target.id === "calendar_next_date_btn" ||
                  $target.id === "calendar_next_date_btn_2" ||
                  $target.id === "calendar_next_date_btn_3"
                ) {
                  thisCalendar.render("next")
                }
              } catch (err) {}
            },
            false
          )
        }

        getMonthData(year, month, day) {
          var calendar_gray =
            "width:70px;height:70px;background-color:#f9f9fb;color:#f9f9fb;font-size:14px;text-align:center"
          var calendar_normal =
            "width:70px;height:70px;background-color:#fff;color:#000;font-size:14px;text-align:center"
          var calendar_current =
            "width:70px;height:70px;background:#3a76b1;color:#fff;font-size:14px;text-align:center"

          var ret = []

          if (!year || !month) {
            var today = new Date()
            year = today.getFullYear()
            month = today.getMonth() + 1
            day = today.getDay()
          }

          var firstDay = new Date(year, month - 1, 1)
          var firstDayWeekDay = firstDay.getDay()
          if (firstDayWeekDay === 0) {
            firstDayWeekDay = 7
          }

          year = firstDay.getFullYear()
          month = firstDay.getMonth() + 1

          var preMonthDayCount = firstDayWeekDay - 1
          var lastDay = new Date(year, month, 0)
          var lastDate = lastDay.getDate()
          var styleCls = ""

          for (var i = 0; i < 7 * 6; i++) {
            var date = i + 1 - preMonthDayCount
            var showDate = date
            var thisMonth = month

            if (date <= 0) {
              thisMonth = month - 1
              showDate = ""
              styleCls = calendar_gray
            } else if (date > lastDate) {
              thisMonth = month + 1
              showDate = showDate - lastDate
              styleCls = "nothing"
            } else {
              var today = new Date()
              if (
                showDate === day &&
                thisMonth === today.getMonth() + 1 &&
                year === today.getFullYear()
              ) {
                styleCls = calendar_current
              } else {
                styleCls = calendar_normal
              }
            }

            if (thisMonth === 13) {
              thisMonth = 1
            } else if (thisMonth === 0) {
              thisMonth = 12
            }

            ret.push({
              month: thisMonth,
              date: date,
              showDate: showDate,
              styleCls: styleCls,
            })
          }

          return { year: year, month: month, date: ret, day: day }
        }

        render(direction, params) {
          var year, month, day
          if (this.monthData) {
            year = this.monthData.year
            month = this.monthData.month
            day = this.monthData.day
          } else {
            year = params.year
            month = params.month
            day = params.day
          }

          if (direction === "prev") {
            month--
            if (month === 0) {
              month = 12
              year--
            }
          } else if (direction === "next") {
            month++
          }

          this.warpper.innerHTML = this.buildUI(year, month, day)
        }

          var calendar_date_picker_warpper =

          var calendar_date_picker_body = "width:499px"

          var calendar_date_picker_table =

          var calendar_date_picker_table_th =
            "height:70px;color:#000;text-align:center;font-size:14px;background-color:#E7E9ED;text-transform:uppercase"
          var calendar_date_picker_table_td =
            "width:70px;height:70px;font-size:14px;text-align:center;color:#f9f9fb;background-color:#f9f9fb"

          var html = ""
          html += "<div style='" + calendar_date_picker_warpper + "'>"

          html += "<div style='" + calendar_date_picker_header + "'>"

          html +=
            "<a style='" + calendar_prev_date_btn + "' id='calendar_prev_date_btn'>"
          html +=
            "<svg height='24' width='24' style='" +
            calendar_prev_date_btn_2 +
            "' id='calendar_prev_date_btn_2' viewbox='0 0 24 24'><path style='" +
            calendar_prev_date_btn_2 +
            "' id='calendar_prev_date_btn_3' d='M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z'></path></svg>"
          html += "</a>"

          html +=
            "<div style='" +
            calendar_date_title +
            "'>" +
            this.monthsWords[this.monthData.month - 1] +
            " " +
            this.monthData.year +
            "</div>"

          html +=
            "<a style='" + calendar_next_date_btn + "' id='calendar_next_date_btn'>"
          html +=
            "<svg height='24' width='24' style='" +
            calendar_next_date_btn_2 +
            "' id='calendar_next_date_btn_2' viewbox='0 0 24 24'><path style='" +
            calendar_next_date_btn_2 +
            "' id='calendar_next_date_btn_3' d='M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z'></path></svg>"
          html += "</a>"

          html += "<table style='" + calendar_date_picker_table + "'><thead><tr>"

          for (var i = 0; i < this.dayWords.length; i++) {
            html +=
              "<th style='" +
              calendar_date_picker_table_th +
              "'>" +
              this.dayWords[i] +
              "</th>"
          }

          html += "</tr></thead><tbody>"

          var started = false

          for (var i = 0; i < this.monthData.date.length; i++) {
            if (i % 7 === 0) {
              if (this.monthData.date[i].styleCls !== "nothing") {
                html += "<tr>"
                started = true
              } else {
                started = false
              }
            }

            if (this.monthData.date[i].styleCls === "nothing") {
              if (started) {
                html += "<td style='" + calendar_date_picker_table_td + "'></td>"
              }
            } else {
              if (started) {
                html +=
                  "<td style='" +
                  this.monthData.date[i].styleCls +
                  "'>" +
                  this.monthData.date[i].showDate +
                  "</td>"
              }
            }

            if (i % 7 === 6) {
              if (started) {
                html += "</tr>"
              }
            }
          }

          html += "</tbody></table></div></div>"

          return html
        }
      }

      function createNewWindow(title, content) {

        closeButton.addEventListener("click", function (e) {

      function createTaskbarButton(windowId, title) {
        var button = document.createElement("div")
        button.classList.add("taskbar-window-button")

      function activateWindow(windowEl) {
        if (activeWindow) {
          var prevTaskbarBtn = document.querySelector(
            ".taskbar-window-button[data-window-id=" + activeWindow.id + "]"
          )
          if (prevTaskbarBtn) {
            prevTaskbarBtn.classList.remove("active")
          }
        }

        // GETTING ALL THE WINDOWS
        var allWindows = document.querySelectorAll(".window")

        // DEACTIVATING ALL THE WINDOW TITLES
        for (var i = 0; i < allWindows.length; i++) {
          var windowElement = allWindows[i]
          windowElement.children[0].classList.add("inactive")
        }

        // ACTIVATING THE WINDOW TITLE
        windowEl.children[0].classList.remove("inactive")

        activeWindow = windowEl
        highestZIndex = highestZIndex + 1
        activeWindow.style.zIndex = highestZIndex

        var windowIframe = getIframe()
        if (windowIframe) {
          windowIframe.focus()
          windowIframe.click()
        }

        var currentTaskbarBtn = document.querySelector(
          ".taskbar-window-button[data-window-id=" + windowEl.id + "]"
        )
        if (currentTaskbarBtn) {
          currentTaskbarBtn.classList.add("active")
        }
      }

      function closeWindow() {
        var windowElement

        if (activeWindow) {
          windowElement = document.getElementById(activeWindow.id)
        }

        if (!windowElement) {
          return
        }

        windowElement.remove()

        var taskbarButton = document.querySelector(
          ".taskbar-window-button[data-window-id=" + activeWindow.id + "]"
        )
        if (taskbarButton) {
          taskbarButton.remove()
        }

        if (activeWindow === windowElement) {
          activeWindow = null
        }

        // GETTING ALL THE WINDOWS
        var allWindows = document.querySelectorAll(".window")

        // AFTER CLOSING A WINDOW, ACTIVATING THE LAST WINDOW (IF ANY)
        if (allWindows.length > 0) {
          var highestZIndex = -1
          var windowToActivate = null

          // FIND THE WINDOW WITH THE HIGHEST Z-INDEX AMONG THE REMAINING WINDOWS
          for (var i = 0; i < allWindows.length; i++) {
            var window = allWindows[i]
            var currentZIndex = parseInt(window.style.zIndex || 0)
            // ENSURE WE DON'T TRY TO ACTIVATE THE WINDOW THAT WAS JUST CLOSED
            if (window !== windowElement && currentZIndex > highestZIndex) {
              highestZIndex = currentZIndex
              windowToActivate = window
            }
          }

          // IF A WINDOW TO ACTIVATE IS FOUND, CLICK IT TO BRING IT TO THE FRONT
          if (windowToActivate) {
            setTimeout(function () {
              windowToActivate.click()
            }, 25)
          }
        }
      }

          // window.isDirty = true
          return iframe.contentWindow.isDirty

      function getIframe() {
        try {
          if (activeWindow) {
            var currentWindow = document.querySelector(
              ".window[id=" + activeWindow.id + "]"

            if (currentWindow) {
              if (currentWindow.childNodes[1].childNodes.length) {
                if (
                  currentWindow.childNodes[1].childNodes[0].nodeName === "IFRAME"
                ) {
                  return currentWindow.childNodes[1].childNodes[0]
                }
              }
            }
          }
        } catch (err) {}
        return null
      }

      function confirmCustom(title, message, yes, no, yesCallback, noCallback) {
        try {

          var confirmContainer = document.createElement("div")

          confirmButtonYes.innerHTML = yes
          confirmButtonYes.addEventListener("click", function (event) {
            document.removeEventListener("keydown", blockKeyboard, true)
            document.body.removeChild(confirmContainer)
            if (yesCallback) {
              yesCallback()
            }
          })

          var confirmButtonNo = document.createElement("div")

            document.removeEventListener("keydown", blockKeyboard, true)

            if (noCallback) {

          })

          confirmForm.appendChild(confirmTitle)
          confirmForm.appendChild(confirmMessage)

          confirmForm.appendChild(confirmButtonNo)

          document.body.appendChild(confirmContainer)
