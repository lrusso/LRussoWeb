        background-color: #000;
      }
      .wallpaper {
        position: fixed;
        z-index: -1;
        left: 0;
        top: 0;
        bottom: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }
      #desktop {
        display: none;
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #desktop-files {
        position: relative;
        width: 100vw;
        height: calc(100vh - (50px));
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        box-sizing: border-box;
        flex-direction: column;
      }
      .desktop-icon {
        flex-direction: column;
        align-items: center;
        display: inline-block;
        overflow: hidden;
        margin-left: 15px;
        margin-top: 15px;
        width: 80px;
        cursor: pointer;
        text-align: center;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
      }
      .desktop-icon img {
        width: 48px;
        height: 48px;
        margin-bottom: 5px;
        color: #fff;
      }
      .desktop-icon span {
        display: block;
        overflow: hidden;
        height: 38px;
        text-overflow: clip;
        color: #fff;
      }
      #taskbar {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: #c0c0c0;
        border-top: 1px solid #fff;
        display: flex;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
      }
      #startButton {
        padding: 5px 16px;
        font-weight: bold;
        margin-left: 5px;
        margin-right: 5px;
        cursor: pointer;
      }
      #startButton svg {
        display: block;
      }
      #taskbarWindows {
        display: flex;
        flex-grow: 1;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        align-items: center;
      }
      .taskbar-window-button {
        border: 1px solid #8c8c8c;
        border-radius: 8px;
        padding: 6px 100px 6px 8px;
        margin-right: 5px;
        height: 22px;
        line-height: 22px;
        display: flex;
        align-items: center;
        max-width: 150px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }
      .taskbar-window-button.active {
        background-color: #999999;
        border: 1px solid #999999;
      }
      #clock {
        height: 22px;
        line-height: 22px;
        padding-left: 15px;
        padding-right: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        cursor: pointer;
      }
      #calendar {
        position: absolute;
        bottom: 50px;
        right: 0;
        z-index: 1001;
      }
      .window {
        position: absolute;
        left: 0 !important;
        top: 0 !important;
        background-color: #c0c0c0;
        box-shadow: 1px 1px 0px 0px #000;
        width: 100%;
        height: calc(100% - (50px));
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      .window-title-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 5px;
        height: 40px;
        padding-right: 5px;
        font-size: 13px;
        font-weight: bold;
        background-color: #3a76b1;
      }
      .window-title-bar.inactive {
        background-color: gray;
      }
      .window-title-text {
        flex-grow: 1;
        margin-left: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #fff;
      }
      .window-controls {
        display: flex;
        justify-content: center;
        align-content: center;
        vertical-align: center;
      }
      .window-control-button {
        cursor: pointer;
      }
      .window-control-button svg {
        display: block;
      }
      .window-content {
        flex-grow: 1;
        background-color: #c0c0c0;
        padding: 0;
        margin: 0;
        overflow: auto;
        color: #000;
        font-size: 14px;
        box-sizing: border-box;
      }
      .window-background {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }
      .confirm_container {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        text-align: center;
        background-color: rgba(0, 0, 0, 0.5);
      }
      .confirm_form {
        position: relative;
        top: 50%;
        left: 0;
        right: 0;
        margin-left: auto;
        margin-right: auto;
        transform: translateY(-50%);
        border-radius: 8px;
        overflow: hidden;
        width: 300px;
        background-color: #f2f2f2;
        text-align: "center";
      }
      .confirm_title {
        text-align: left;
        padding-left: 10px;
        background-color: #3a76b1;
        font-weight: bold;
        color: #fff;
        line-height: 2.5;
      }
      .confirm_message {
        padding: 20px;
        text-align: center;
        line-height: 2;
      }
      .confirm_yes {
        display: inline-block;
        overflow: hidden;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 40px;
        padding-right: 40px;
        margin-bottom: 10px;
        background-color: #d2d2d2;
        border: 1px solid #b2b2b2;
        border-radius: 8px;
        text-align: center;
        line-height: 1.5;
        cursor: pointer;
      }
      .confirm_no {
        display: inline-block;
        overflow: hidden;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 40px;
        padding-right: 40px;
        margin-left: 20px;
        margin-bottom: 10px;
        background-color: #d2d2d2;
        border: 1px solid #b2b2b2;
        border-radius: 8px;
        text-align: center;
        line-height: 1.5;
        cursor: pointer;
      }
      .booting {
        position: fixed;
        width: 64px;
        height: 64px;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto auto;
        border: 0;
        z-index: 999;
      }
      .lds-spinner {
        color: #fff;
        display: inline-block;
        position: relative;
        width: 64px;
        height: 64px;
      }
      .lds-spinner div {
        transform-origin: 32px 32px;
        animation: lds-spinner 1.2s linear infinite;
      }
      .lds-spinner div:after {
        content: " ";
        display: block;
        position: absolute;
        top: 3px;
        left: 29px;
        width: 5px;
        height: 14px;
        border-radius: 20%;
        background: #fff;
      }
      .lds-spinner div:nth-child(1) {
        transform: rotate(0deg);
        animation-delay: -1.1s;
      }
      .lds-spinner div:nth-child(2) {
        transform: rotate(30deg);
        animation-delay: -1s;
      }
      .lds-spinner div:nth-child(3) {
        transform: rotate(60deg);
        animation-delay: -0.9s;
      }
      .lds-spinner div:nth-child(4) {
        transform: rotate(90deg);
        animation-delay: -0.8s;
      }
      .lds-spinner div:nth-child(5) {
        transform: rotate(120deg);
        animation-delay: -0.7s;
      }
      .lds-spinner div:nth-child(6) {
        transform: rotate(150deg);
        animation-delay: -0.6s;
      }
      .lds-spinner div:nth-child(7) {
        transform: rotate(180deg);
        animation-delay: -0.5s;
      }
      .lds-spinner div:nth-child(8) {
        transform: rotate(210deg);
        animation-delay: -0.4s;
      }
      .lds-spinner div:nth-child(9) {
        transform: rotate(240deg);
        animation-delay: -0.3s;
      }
      .lds-spinner div:nth-child(10) {
        transform: rotate(270deg);
        animation-delay: -0.2s;
      }
      .lds-spinner div:nth-child(11) {
        transform: rotate(300deg);
        animation-delay: -0.1s;
      }
      .lds-spinner div:nth-child(12) {
        transform: rotate(330deg);
        animation-delay: 0s;
      }
      @keyframes lds-spinner {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>

      class Screensaver {
        constructor({ secondsInactive, speed, logo, disabledWhenUsingIframes }) {
          this.secondsInactive = secondsInactive
          this.speed = speed
          this.logo = logo
          this.disabledWhenUsingIframes = disabledWhenUsingIframes
          this.container = null
          this.imgX = 0
          this.imgY = 0
          this.imgWidth = 0
          this.imgHeight = 0
          this.idleCounter = 0
          this.movingDown = true
          this.enabled = false

          var _this = this
          var tmpImg = document.createElement("img")
          tmpImg.src = logo
          tmpImg.onload = function () {
            _this.imgWidth = tmpImg.width
            _this.imgHeight = tmpImg.height
            _this.init()
          }
        }

        init() {
          this.container = document.createElement("div")
          this.container.style.position = "fixed"
          this.container.style.left = 0
          this.container.style.right = 0
          this.container.style.top = 0
          this.container.style.bottom = 0
          this.container.style.zIndex = 9999
          this.container.style.cursor = "none"
          this.container.style.display = "none"
          this.container.style.outline = "none"
          this.container.style.backgroundColor = "#000"
          this.container.style.userSelect = "none"
          this.container.style.backgroundImage = "url(" + this.logo + ")"
          this.container.style.backgroundRepeat = "no-repeat"
          document.getElementsByTagName("BODY")[0].appendChild(this.container)

          var _this = this
          setInterval(_this.updateCounter.bind(_this), 1000)

          window.addEventListener("click", function () {
            _this.stop()
          })
          window.addEventListener("dblclick", function () {
            _this.stop()
          })
          window.addEventListener("mouseup", function () {
            _this.stop()
          })
          window.addEventListener("mousemove", function () {
            _this.stop()
          })
          window.addEventListener("wheel", function () {
            _this.stop()
          })
          window.addEventListener("keypress", function () {
            _this.stop()
          })
          window.addEventListener("keydown", function () {
            _this.stop()
          })
          window.addEventListener("keyup", function () {
            _this.stop()
          })
          window.addEventListener("touchstart", function () {
            _this.stop()
          })
        }

        updateCounter() {
          var hasIframe = document.getElementsByTagName("iframe")[0] ? true : false

          if (this.disabledWhenUsingIframes && hasIframe) {
            return
          }

          this.idleCounter = this.idleCounter + 1

          if (this.idleCounter >= this.secondsInactive) {
            if (!this.enabled) {
              this.startScreensaver()
            }
          }
        }

        startScreensaver() {
          this.enabled = true

          this.imgX = 0
          this.imgY = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "hidden"

          this.container.style.display = "block"

          window.scrollTo(0, 0)

          this.animate()
        }

        stop() {
          if (!document.hasFocus()) {
            return
          }

          this.enabled = false

          this.idleCounter = 0

          document.getElementsByTagName("BODY")[0].style.overflowY = "initial"

          this.container.style.display = "none"
        }

        animate() {
          var _this = this

          function loop() {
            if (_this.enabled) {
              _this.imgX = _this.imgX + _this.speed
              _this.imgY = _this.movingDown
                ? _this.imgY + _this.speed
                : _this.imgY - _this.speed

              _this.container.style.backgroundPositionX =
                _this.imgX.toFixed(0) + "px"
              _this.container.style.backgroundPositionY =
                _this.imgY.toFixed(0) + "px"

              if (_this.imgY > _this.container.offsetHeight - _this.imgHeight) {
                _this.movingDown = false
              }

              if (_this.imgY < 0) {
                _this.movingDown = true
              }

              if (_this.imgX > _this.container.offsetWidth) {
                _this.imgX = -_this.imgWidth
                _this.imgY = parseInt(
                  Math.random() * _this.container.offsetHeight - _this.imgHeight
                )
                _this.movingDown = true
              }

              setTimeout(loop, 20)
            }
          }

          loop()
        }
      }

            },

        getMonthData(year, month, day) {
          var calendar_gray =
            "width:70px;height:70px;background-color:#f9f9fb;color:#f9f9fb;font-size:14px;text-align:center"
          var calendar_normal =
            "width:70px;height:70px;background-color:#fff;color:#000;font-size:14px;text-align:center"
          var calendar_current =
            "width:70px;height:70px;background:#3a76b1;color:#fff;font-size:14px;text-align:center"

          var ret = []

          if (!year || !month) {
            var today = new Date()
            year = today.getFullYear()
            month = today.getMonth() + 1
            day = today.getDay()
          }

          var firstDay = new Date(year, month - 1, 1)
          var firstDayWeekDay = firstDay.getDay()
          if (firstDayWeekDay === 0) {
            firstDayWeekDay = 7
          }

          year = firstDay.getFullYear()
          month = firstDay.getMonth() + 1

          var preMonthDayCount = firstDayWeekDay - 1
          var lastDay = new Date(year, month, 0)
          var lastDate = lastDay.getDate()
          var styleCls = ""

          for (var i = 0; i < 7 * 6; i++) {
            var date = i + 1 - preMonthDayCount
            var showDate = date
            var thisMonth = month

            if (date <= 0) {
              thisMonth = month - 1
              showDate = ""
              styleCls = calendar_gray
            } else if (date > lastDate) {
              thisMonth = month + 1
              showDate = showDate - lastDate
              styleCls = "nothing"
            } else {
              var today = new Date()
              if (
                showDate === day &&
                thisMonth === today.getMonth() + 1 &&
                year === today.getFullYear()
              ) {
                styleCls = calendar_current
              } else {
                styleCls = calendar_normal
              }
            }

            if (thisMonth === 13) {
              thisMonth = 1
            } else if (thisMonth === 0) {
              thisMonth = 12
            }

            ret.push({
              month: thisMonth,
              date: date,
              showDate: showDate,
              styleCls: styleCls,
            })
          }

          return { year: year, month: month, date: ret, day: day }
        }

        render(direction, params) {
          var year, month, day
          if (this.monthData) {
            year = this.monthData.year
            month = this.monthData.month
            day = this.monthData.day
          } else {
            year = params.year
            month = params.month
            day = params.day
          }

          if (direction === "prev") {
            month--
            if (month === 0) {
              month = 12
              year--
            }
          } else if (direction === "next") {
            month++
          }

          this.warpper.innerHTML = this.buildUI(year, month, day)

          var calendar_date_picker_table_td =

          var html = ""

          html += "<div style='" + calendar_date_picker_header + "'>"

          html +=
            "<a style='" + calendar_prev_date_btn + "' id='calendar_prev_date_btn'>"

            "' id='calendar_prev_date_btn_3' d='M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z'></path></svg>"
          html += "</a>"

          html +=
            "<div style='" +

            "'>" +
            this.monthsWords[this.monthData.month - 1] +
            " " +
            this.monthData.year +
            "</div>"

          html +=
            "<a style='" + calendar_next_date_btn + "' id='calendar_next_date_btn'>"
          html +=
            "<svg height='24' width='24' style='" +
            calendar_next_date_btn_2 +
            "' id='calendar_next_date_btn_2' viewbox='0 0 24 24'><path style='" +

          html += "</tr></thead><tbody>"

          var started = false

          for (var i = 0; i < this.monthData.date.length; i++) {
            if (i % 7 === 0) {
              if (this.monthData.date[i].styleCls !== "nothing") {
                html += "<tr>"
                started = true
              } else {
                started = false

            }

            if (this.monthData.date[i].styleCls === "nothing") {

              }
            } else {

              }

            if (i % 7 === 6) {

              }
            }
          }

          html += "</tbody></table></div></div>"

          return html
        }

      function activateWindow(windowEl) {
        if (activeWindow) {
          var prevTaskbarBtn = document.querySelector(
            ".taskbar-window-button[data-window-id=" + activeWindow.id + "]"
          )
          if (prevTaskbarBtn) {
            prevTaskbarBtn.classList.remove("active")
          }
        }

        // GETTING ALL THE WINDOWS
        var allWindows = document.querySelectorAll(".window")

        // DEACTIVATING ALL THE WINDOW TITLES
        for (var i = 0; i < allWindows.length; i++) {
          var windowElement = allWindows[i]
          windowElement.children[0].classList.add("inactive")
        }

        // ACTIVATING THE WINDOW TITLE
        windowEl.children[0].classList.remove("inactive")

        activeWindow = windowEl
        highestZIndex = highestZIndex + 1
        activeWindow.style.zIndex = highestZIndex

        var windowIframe = getIframe()
        if (windowIframe) {
          windowIframe.focus()
          windowIframe.click()
        }

        var currentTaskbarBtn = document.querySelector(
          ".taskbar-window-button[data-window-id=" + windowEl.id + "]"
        )
        if (currentTaskbarBtn) {
          currentTaskbarBtn.classList.add("active")
        }

      function closeWindow() {
        var windowElement

        if (activeWindow) {
          windowElement = document.getElementById(activeWindow.id)
        }

        if (!windowElement) {
          return
        }

        windowElement.remove()

        var taskbarButton = document.querySelector(
          ".taskbar-window-button[data-window-id=" + activeWindow.id + "]"
        )
        if (taskbarButton) {
          taskbarButton.remove()
        }

        if (activeWindow === windowElement) {
          activeWindow = null
        }

        // GETTING ALL THE WINDOWS
        var allWindows = document.querySelectorAll(".window")

        // AFTER CLOSING A WINDOW, ACTIVATING THE LAST WINDOW (IF ANY)
        if (allWindows.length > 0) {
          var highestZIndex = -1
          var windowToActivate = null

          // FIND THE WINDOW WITH THE HIGHEST Z-INDEX AMONG THE REMAINING WINDOWS
          for (var i = 0; i < allWindows.length; i++) {
            var window = allWindows[i]
            var currentZIndex = parseInt(window.style.zIndex || 0)
            // ENSURE WE DON'T TRY TO ACTIVATE THE WINDOW THAT WAS JUST CLOSED
            if (window !== windowElement && currentZIndex > highestZIndex) {
              highestZIndex = currentZIndex
              windowToActivate = window
            }
          }

          // IF A WINDOW TO ACTIVATE IS FOUND, CLICK IT TO BRING IT TO THE FRONT
          if (windowToActivate) {
            setTimeout(function () {
              windowToActivate.click()
            }, 25)
          }
        }

                  return currentWindow.childNodes[1].childNodes[0]
                }
              }
            }
          }
        } catch (err) {}
        return null

            event.target.id !== "calendar_next_date_btn" &&
            event.target.id !== "calendar_next_date_btn_2" &&
            event.target.id !== "calendar_next_date_btn_3"
          ) {
            document.getElementById("calendar").innerHTML = ""
          }
        })
      }

      function updateClock(elem) {
        var now = new Date()
        var hours = now.getHours().toString().padStart(2, "0")
        var minutes = now.getMinutes().toString().padStart(2, "0")
        elem.textContent = hours + ":" + minutes
      }

      function renderDesktopItems() {
        var desktopFiles = document.getElementById("desktop-files")

        for (var i = 0; i < DESKTOP_FILES.length; i++) {
          var file = DESKTOP_FILES[i]

          var iconDiv = document.createElement("div")
          iconDiv.classList.add("desktop-icon")

          var iconImg = document.createElement("img")
          iconImg.src = file.icon
          iconImg.alt = file.filename

          var filenameSpan = document.createElement("span")
          filenameSpan.textContent = file.filename

          iconDiv.appendChild(iconImg)
          iconDiv.appendChild(filenameSpan)
          ;(function (f) {
            iconDiv.addEventListener("click", function () {
              createNewWindow(f.filename, f.content)
            })
          })(file)

          desktopFiles.appendChild(iconDiv)
        }
      }

      window.addEventListener("resize", function () {
        // GETTING ALL THE WINDOWS
        var allWindows = document.querySelectorAll(".window")

        // CENTERING ALL THE WINDOWS THAT ARE NOT MAXIMIZED
        for (var i = 0; i < allWindows.length; i++) {
          var windowElement = allWindows[i]
          if (windowElement.style.width === "auto") {
            windowElement.style.marginLeft =
              window.innerWidth / 2 - windowElement.offsetWidth / 2 + "px"
            windowElement.style.marginTop =
              window.innerHeight / 2 - windowElement.offsetHeight / 2 - 50 + "px"
          }
        }
      })
