<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Signature Generator</title>

    >
    <meta name="theme-color" content="#000">
    <meta name="keywords" content="github, notifications, read">
    <meta name="description" content="GitHub Read.">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    >
    <style>
      html,body{padding:0;margin:0;font-family:Arial;background:#000}
      hr{display:none}
      br{display:none}
      table{display:none}
      input[type=text]{height:30px;width:90px;font-family:Arial;font-size:13px;margin:0;padding:0;margin-left:10px;margin-top:10px;margin-bottom:5px;box-sizing:border-box}
      .pleasewait{position:fixed;width:64px;height:64px;left:0;right:0;top:0;bottom:0;margin:auto auto;border:0}.lds-spinner{color:#fff;display:inline-block;position:relative;width:64px;height:64px}.lds-spinner div{transform-origin:32px 32px;animation:lds-spinner 1.2s linear infinite}.lds-spinner div:after{content:" ";display:block;position:absolute;top:3px;left:29px;width:5px;height:14px;border-radius:20%;background:#fff}.lds-spinner div:nth-child(1){transform:rotate(0deg);animation-delay:-1.1s}.lds-spinner div:nth-child(2){transform:rotate(30deg);animation-delay:-1s}.lds-spinner div:nth-child(3){transform:rotate(60deg);animation-delay:-.9s}.lds-spinner div:nth-child(4){transform:rotate(90deg);animation-delay:-.8s}.lds-spinner div:nth-child(5){transform:rotate(120deg);animation-delay:-.7s}.lds-spinner div:nth-child(6){transform:rotate(150deg);animation-delay:-.6s}.lds-spinner div:nth-child(7){transform:rotate(180deg);animation-delay:-.5s}.lds-spinner div:nth-child(8){transform:rotate(210deg);animation-delay:-.4s}.lds-spinner div:nth-child(9){transform:rotate(240deg);animation-delay:-.3s}.lds-spinner div:nth-child(10){transform:rotate(270deg);animation-delay:-.2s}.lds-spinner div:nth-child(11){transform:rotate(300deg);animation-delay:-.1s}.lds-spinner div:nth-child(12){transform:rotate(330deg);animation-delay:0s}@keyframes lds-spinner{0%{opacity:1}to{opacity:0}}
    </style>
  </head>
  <body>
    <div class="pleasewait">
      <div class="lds-spinner">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
    <input type="text" id="nameField">
    <input type="text" id="role">
    <input type="text" id="slogan">
    <input type="text" id="webText">
    <input type="text" id="webLink">
    <input type="text" id="emailField">
    <input type="text" id="photo">
    <hr>
    <br>
    <br>
    <table
      style="font-family:Arial;font-size:13px;margin:0;width:352px;padding:0;border-spacing:0;border-collapse:collapse;height:125px !important;overflow-y:hidden"
    >
      <tr>
        <td
          style="margin:0;padding:0;width:125px;height:125px !important;overflow-y:hidden;vertical-align:middle;"
        >
          <img
            style="width:100%;height:100%;border-radius:50%"
            alt="image"
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH5QgIBRYuuRw5TAAAAB1pVFh0Q29tbWVudAAAAAAAQ3JlYXRlZCB3aXRoIEdJTVBkLmUHAAAADElEQVQI12P4//8/AAX+Av7czFnnAAAAAElFTkSuQmCC"
          >
        </td>
        <td
          style="margin:0;padding-left:18px;padding-top:0;padding-bottom:0;padding-right:0;vertical-align:middle;width:1px"
        >
          <div
            style="float:left;width:1px;height:125px !important;background-color:#cccccc"
          ></div>
        </td>
        <td
          style="margin:0;padding:0;vertical-align:middle;height:125px !important;overflow-y:hidden"
        >
          <span style="display:block;color:#000;margin-left:16px;font-weight:bold"
            >&nbsp;</span
          >
          <span style="display:block;color:#8c8c8c;margin-left:16px;margin-top:3px"
            >&nbsp;</span
          >
          <span
            style="display:block;color:#3d85c6;margin-left:16px;margin-top:10px;font-weight:bold"
            >&nbsp;</span
          >
          <span style="display:block;color:#000;margin-left:16px;margin-top:10px"
            >&#x1F310;&nbsp;&nbsp;<a
              href="https://www.a.com"
              style="color:#3d85c6;text-decoration:unset"
              target="_blank"
              >&nbsp;</a
            ></span
          ><span style="display:block;color:#000;margin-left:16px;margin-top:5px"
            >&#x1F4E7;&nbsp;&nbsp;<a
              href="a@a.com"
              style="color:#3d85c6;text-decoration:unset"
              target="_blank"
              >&nbsp;</a
            ></span
          >
        </td>
      </tr>
    </table>
    <script>
      var APP_STRINGS = {
        en: {
          name: "Name",
          role: "Role",
          slogan: "Slogan",
          webText: "Web Text",
          webLink: "Web Link",
          email: "Email",
          photo: "Photo URL",
        },
        es: {
          name: "Nombre",
          role: "Puesto",
          slogan: "Slogan",
          webText: "Web Texto",
          webLink: "Web Link",
          email: "Email",
          photo: "Foto URL",
        },
      }

      var USER_LANG = window.navigator.language.substring(0, 2).toLowerCase()
      var GET_APP_STRING = APP_STRINGS[USER_LANG] || APP_STRINGS["en"]

      function t(stringName) {
        return GET_APP_STRING[stringName] || ""
      }

      var pleaseWait = null
      var separators1 = null
      var separators2 = null
      var container = null
      var inputName = null
      var inputRole = null
      var inputSlogan = null
      var inputWebText = null
      var inputWebLink = null
      var inputEmail = null
      var inputPhoto = null
      var labelName = null
      var labelRole = null
      var labelSlogan = null
      var labelWeb = null
      var labelEmail = null
      var imagePhoto = null

      function update() {
        labelName.innerText = inputName.value || "\xA0"
        labelRole.innerText = inputRole.value || "\xA0"
        labelSlogan.innerText = inputSlogan.value || "\xA0"
        labelWeb.innerText = inputWebText.value || "\xA0"
        labelWeb.href = inputWebLink.value || " "
        labelEmail.innerText = inputEmail.value || "\xA0"
        labelEmail.href = "mailto:" + inputEmail.value || " "
        imagePhoto.alt = inputName.value || "\xA0"
        imagePhoto.src = inputPhoto.value
      }

      window.addEventListener("load", function () {
        // checking if the app is loaded properly
        var secSameDomain = false
        var secNotIframe = window.top === window.self
        var secLocalFile = window.self.location.protocol === "file:"
        try {
          secSameDomain =
            window.top !== window.self &&
            window.top.location.hostname === window.self.location.hostname
        } catch (err) {
          //
        }
        if (secNotIframe || secSameDomain || secLocalFile) {
          pleaseWait = document.querySelector(".pleasewait")
          separators1 = document.querySelectorAll("hr")
          separators2 = document.querySelectorAll("br")
          container = document.querySelector("table")

          inputName = document.querySelectorAll("input")[0]
          inputRole = document.querySelectorAll("input")[1]
          inputSlogan = document.querySelectorAll("input")[2]
          inputWebText = document.querySelectorAll("input")[3]
          inputWebLink = document.querySelectorAll("input")[4]
          inputEmail = document.querySelectorAll("input")[5]
          inputPhoto = document.querySelectorAll("input")[6]

          labelName = document.querySelectorAll("span")[0]
          labelRole = document.querySelectorAll("span")[1]
          labelSlogan = document.querySelectorAll("span")[2]
          labelWeb = document.querySelectorAll("a")[0]
          labelEmail = document.querySelectorAll("a")[1]

          imagePhoto = document.querySelectorAll("img")[0]

          document.querySelector("html").style.backgroundColor = "#fff"
          document.querySelector("body").style.backgroundColor = "#fff"

          pleaseWait.style.display = "none"

          separators1.forEach(function (el) {
            el.style.display = "block"
          })

          separators2.forEach(function (el) {
            el.style.display = "block"
          })

          container.style.display = "block"

          inputName.placeholder = t("name")
          inputRole.placeholder = t("role")
          inputSlogan.placeholder = t("slogan")
          inputWebText.placeholder = t("webText")
          inputWebLink.placeholder = t("webLink")
          inputEmail.placeholder = t("email")
          inputPhoto.placeholder = t("photo")

          inputName.addEventListener("input", update)
          inputRole.addEventListener("input", update)
          inputSlogan.addEventListener("input", update)
          inputWebText.addEventListener("input", update)
          inputWebLink.addEventListener("input", update)
          inputEmail.addEventListener("input", update)
          inputPhoto.addEventListener("input", update)
        }
      })
    </script>
  </body>
</html>
